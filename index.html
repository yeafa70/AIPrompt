<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #111827; /* 深色背景 gray-900 */
        }
        
        /* 自訂卷軸樣式 (深色) */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1f2937; /* gray-800 */
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #4b5563; /* gray-600 */
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #6b7280; /* gray-500 */
        }

        /* 卡片頂部紫色裝飾線 */
        .card-top-border {
            border-top: 4px solid #a855f7; /* Tailwind purple-500 */
        }
    </style>
</head>
<body class="min-h-screen text-gray-100 pb-20">

    <!-- Header 區域 -->
    <header class="pt-12 pb-8 px-4 text-center">
        <h1 class="text-3xl font-bold mb-3 flex items-center justify-center gap-2">
            <span>🚀</span> AI Prompt 智能寶庫
        </h1>
        <a href="https://docs.google.com/spreadsheets/d/1iu_yyQnueh-Th_sCH8uIarbDM30cHRJbjhzmL70ob14/edit?usp=sharing" 
           target="_blank" 
           class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-200 transition-colors bg-gray-800 px-3 py-1 rounded-full shadow-sm border border-gray-700">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
            開啟原始資料 Google Sheet
        </a>
    </header>

    <!-- 搜尋欄 -->
    <section class="max-w-2xl mx-auto px-4 mb-8 relative">
        <div class="relative shadow-sm rounded-full bg-gray-800">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <input type="text" id="searchInput" placeholder="搜尋提示詞..." 
                   class="block w-full pl-11 pr-4 py-3 rounded-full border border-gray-700 bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-100 placeholder-gray-500">
        </div>
    </section>

    <!-- 標籤過濾區 -->
    <section class="max-w-5xl mx-auto px-4 mb-12">
        <div id="tagsContainer" class="flex flex-wrap justify-center gap-2 md:gap-3">
            <!-- 標籤將透過 JS 動態生成 -->
            <span class="text-sm text-gray-400">載入分類中...</span>
        </div>
    </section>

    <!-- 內容區域 -->
    <main class="max-w-7xl mx-auto px-4">
        <div class="flex items-center gap-2 mb-6 ml-2">
            <span class="text-2xl">🧠</span>
            <h2 class="text-2xl font-bold">AI 協思</h2>
        </div>

        <!-- 載入狀態指示 -->
        <div id="loadingIndicator" class="text-center py-10 text-gray-400 hidden">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-2"></div>
            <p>正在從 Google Sheet 讀取資料...</p>
        </div>

        <!-- 卡片網格 -->
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- 卡片將透過 JS 動態生成 -->
        </div>
        
        <!-- 無結果提示 -->
        <div id="noResults" class="text-center py-16 text-gray-400 hidden">
            <svg class="mx-auto h-12 w-12 text-gray-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p class="text-lg">找不到符合條件的提示詞</p>
        </div>
    </main>

    <!-- JavaScript 邏輯 -->
    <script>
        // Google Sheet ID (從使用者提供的 URL 中提取)
        const SHEET_ID = '1iu_yyQnueh-Th_sCH8uIarbDM30cHRJbjhzmL70ob14';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        // 預設資料 (當無法連線到 Google Sheet 時的備用資料，對應截圖內容)
        const fallbackData = [
            { category: '內容創作', title: '意義單詞', content: '將文章的重點部分，尋找一個代表性英文字母，並使這些字母的首字組合成一個具有意義的單詞（如「VISION」）。' },
            { category: '內容創作', title: '品牌名稱', content: '完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想5個產品名稱與標語（口號）。\n\n- 提示詞指令：描述品牌與產品，請列出數字個產品名稱與行銷標題建議。（*品牌定義*描述、*產品介紹*描述）\n- Prompt\n  - 我推出一個運動鞋品牌，今年會銷售一款新型跑步鞋...' },
            { category: '筆記精煉', title: '長編文章', content: '為這一篇長篇文章，進行以下四個步驟，每一個步驟都提供給文章與標示出來\n\n第1、請為這篇長文件生成一份簡短摘要。\n第2、請基於上一個摘要，不要遺漏任何專有名詞、數字或關鍵人物，重新生成一份摘要。\n第3、現在，請將摘要中每一句話都濃縮成更簡潔的表達，同時保留原意...' },
            { category: '筆記精煉', title: '書籍精煉', content: '請對 @[檔名]\n啟動【終極煉金管線】，一次執行四步驟整合：\n\n第一步：全域架構導航 (Stage 01)\n執行 stage-1-navigator，對精煉稿進行深度掃描，產出知識地圖與反直覺預警。\n存檔：01_Map_[主題簡稱].md。\n\n第二步：價值 DNA 診斷 (Stage 02)' },
            { category: '筆記精煉', title: '提取練習', content: '我剛讀完了關於 [填入具體段落標題] 的內容。現在請幫我進行深度研磨：\n\n1-底層邏輯拷問：針對這段內容的「運作原理」向我提問，測試我是是否理解了「為什麼有效」，而非只是記住步驟。\n\n2-環境弱化：如果這段概念有複雜的...' },
            { category: '內容創作', title: '影片清理', content: '你的角色是一位「逐字稿校對員」，不是編輯。\n任務：\n1-僅刪除口語填充詞、重複說法、明顯冗詞\n2-不得改寫句型、不得改變原意、不得加入新解釋\n規則：\n1-原句順序必須完全一致\n2-若刪除任何詞語，需確保刪前與刪後語氣通順' },
            { category: '內容創作', title: '結構化整理', content: '你的角色是一位「內容結構化整理員」，不是編輯、不是評論者。\n\n我會提供一段約 4000 字的影片文字內容，請你在完全保留原作者語意與立場的前提下，\n進行「保留語意的濃縮」，將內容壓縮至約 2000 字。全文用繁體中文呈現。' }
        ];

        let promptsData = [];
        let uniqueCategories = ['全部'];
        let activeCategory = '全部';

        // DOM 元素
        const elements = {
            tagsContainer: document.getElementById('tagsContainer'),
            cardsContainer: document.getElementById('cardsContainer'),
            searchInput: document.getElementById('searchInput'),
            loadingIndicator: document.getElementById('loadingIndicator'),
            noResults: document.getElementById('noResults')
        };

        // 初始化應用
        async function init() {
            elements.loadingIndicator.classList.remove('hidden');
            elements.cardsContainer.innerHTML = '';
            elements.tagsContainer.innerHTML = '';
            
            await fetchGoogleSheetData();
            
            // 提取所有獨立的分類
            const cats = new Set(promptsData.map(item => item.category));
            // 將常見分類排前面，或依照出現順序
            uniqueCategories = ['全部', ...Array.from(cats)];
            
            renderTags();
            renderCards();
            elements.loadingIndicator.classList.add('hidden');

            // 綁定搜尋事件
            elements.searchInput.addEventListener('input', () => {
                renderCards();
            });
        }

        // 讀取 Google Sheet 資料
        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                
                // Google Visualization API 會回傳一段包裝過的 JSON，需要去除外層的函式呼叫
                const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
                const data = JSON.parse(jsonString);

                // 智慧判斷欄位索引 (尋找包含關鍵字的欄位名稱)
                let catIdx = 0, titleIdx = 1, promptIdx = 2;
                const headers = data.table.cols.map(c => c ? c.label : '');
                
                headers.forEach((header, index) => {
                    if(!header) return;
                    if(/分類|類別|標籤|Category|Tag/i.test(header)) catIdx = index;
                    if(/標題|名稱|主題|Title|Name/i.test(header)) titleIdx = index;
                    if(/提示詞|內容|指令|Prompt|Content/i.test(header)) promptIdx = index;
                });

                // 解析列資料
                const parsedData = data.table.rows.map(row => {
                    const cols = row.c;
                    return {
                        category: cols[catIdx] && cols[catIdx].v ? cols[catIdx].v.toString() : '未分類',
                        title: cols[titleIdx] && cols[titleIdx].v ? cols[titleIdx].v.toString() : '無標題',
                        content: cols[promptIdx] && cols[promptIdx].v ? cols[promptIdx].v.toString() : ''
                    };
                }).filter(item => item.title !== '無標題' || item.content !== ''); // 過濾空行

                if(parsedData.length > 0) {
                    promptsData = parsedData;
                } else {
                    promptsData = fallbackData; // 如果抓出來是空的，用備用資料
                }

            } catch (error) {
                console.warn("無法從 Google Sheet 讀取資料，將使用備用顯示資料：", error);
                promptsData = fallbackData;
            }
        }

        // 渲染上方標籤列
        function renderTags() {
            elements.tagsContainer.innerHTML = uniqueCategories.map(category => {
                const isActive = category === activeCategory;
                // 依據是否選中設定不同 CSS (深色版)
                const baseClasses = "px-5 py-2 rounded-full text-sm font-medium transition-all duration-200 cursor-pointer border";
                const activeClasses = "bg-blue-600 text-white border-blue-600 shadow-md";
                const inactiveClasses = "bg-gray-800 text-gray-300 border-gray-700 hover:border-blue-500 hover:text-blue-400 shadow-sm";
                
                return `
                    <button 
                        class="${baseClasses} ${isActive ? activeClasses : inactiveClasses}"
                        onclick="setCategory('${category}')">
                        ${category}
                    </button>
                `;
            }).join('');
        }

        // 設定目前選取的分類
        window.setCategory = function(category) {
            activeCategory = category;
            renderTags();
            renderCards();
        }

        // 渲染卡片
        function renderCards() {
            const searchText = elements.searchInput.value.toLowerCase();
            
            // 過濾資料 (分類 + 搜尋字眼)
            const filteredData = promptsData.filter(item => {
                const matchCategory = activeCategory === '全部' || item.category === activeCategory;
                const matchSearch = item.title.toLowerCase().includes(searchText) || 
                                    item.content.toLowerCase().includes(searchText);
                return matchCategory && matchSearch;
            });

            if (filteredData.length === 0) {
                elements.cardsContainer.innerHTML = '';
                elements.noResults.classList.remove('hidden');
                return;
            }

            elements.noResults.classList.add('hidden');

            elements.cardsContainer.innerHTML = filteredData.map(item => `
                <div class="bg-gray-800 rounded-2xl shadow-sm border border-gray-700 flex flex-col overflow-hidden hover:shadow-md transition-shadow card-top-border">
                    <div class="p-5 flex flex-col h-full">
                        <!-- 分類標籤 -->
                        <div class="mb-3">
                            <span class="inline-block bg-blue-900/50 text-blue-300 text-xs px-2.5 py-1 rounded-md font-medium tracking-wide border border-blue-800/50">
                                ${item.category}
                            </span>
                        </div>
                        
                        <!-- 標題 -->
                        <h3 class="font-bold text-lg text-gray-100 mb-3">${item.title}</h3>
                        
                        <!-- 提示詞內容區塊 (可捲動) -->
                        <div class="bg-gray-900 rounded-xl p-4 text-sm text-gray-300 flex-grow overflow-y-auto custom-scrollbar relative" style="height: 180px;">
                            <div class="whitespace-pre-wrap">${item.content}</div>
                        </div>
                        
                        <!-- 複製按鈕 -->
                        <button 
                            onclick="copyToClipboard(this, \`${item.content.replace(/`/g, '\\`')}\`)"
                            class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2">
                            <span>複製 Prompt</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 複製到剪貼簿功能
        window.copyToClipboard = function(btnElement, text) {
            const originalHTML = btnElement.innerHTML;
            
            // 使用 Clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showSuccess(btnElement, originalHTML));
            } else {
                // 備用方案 (針對舊瀏覽器或非 HTTPS)
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showSuccess(btnElement, originalHTML);
                } catch (err) {
                    console.error('複製失敗', err);
                    btnElement.innerText = "複製失敗";
                }
                textArea.remove();
            }
        }

        // 顯示複製成功動畫
        function showSuccess(btnElement, originalHTML) {
            btnElement.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                <span>已複製!</span>
            `;
            btnElement.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            btnElement.classList.add('bg-green-500', 'hover:bg-green-600');
            
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                btnElement.classList.remove('bg-green-500', 'hover:bg-green-600');
                btnElement.classList.add('bg-blue-600', 'hover:bg-blue-700');
            }, 2000);
        }

        // 啟動應用程式
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
